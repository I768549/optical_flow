# Lucas-Kanade optical flow parameters
lk_win_size: 39
lk_max_level: 3
lk_max_count: 35
lk_epsilon: 0.01

# Feature detection (goodFeaturesToTrack)
feature_max_corners: 125
feature_quality_level: 0.05
feature_min_distance: 18
feature_block_size: 19

# Re-detect features when count drops below this
min_features: 30

# Forward-backward LK sanity check: max round-trip error in pixels
fb_threshold: 2.5

# Frame processing resolution
frame_width: 1280
frame_height: 720

# Camera capture tuning (similar to tracker defaults)
capture_codec: MJPG
capture_fps: 30
capture_buffer_size: 1
  